---
# Pins the CI platform/version matrix for this role. Without this, ansible-generator
# falls back to default_platforms and silently discards these choices on regenerate.
platforms:
  # EL excluded: glusterfs-server isn't in EL9/10's base/AppStream repos
  # (only the client-only "glusterfs" package is); the server component
  # needs a SIG or gluster.org repo this role doesn't set up.
  - name: Debian
    versions:
      - all
  - name: Fedora
    versions:
      # Excludes 45: it ships Python 3.15.0b3, whose dataclasses module
      # dropped _is_type, breaking ansible-core's AnsiballZ module wrapper.
      - "44"
      - "43"
  - name: Ubuntu
    versions:
      - all
